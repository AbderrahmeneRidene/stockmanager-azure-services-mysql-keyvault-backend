spring.application.name=stockmanager-rest-api
server.port=${PORT:8080}

app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

spring.datasource.url=${mysql-url}
spring.datasource.username=${mysql-username}
spring.datasource.password=${mysql-password}

spring.cloud.azure.keyvault.secret.property-sources[0].endpoint=https://kv-ridene-fullstack.vault.azure.net/

logging.level.org.springframework.test.context.support=warn
logging.level.org.springframework.boot.test.context.SpringBootTestContextBootstrapper=warn

